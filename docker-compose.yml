version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/opt/models
    environment:
      - ENVIRONMENT=production
      - MODEL_CACHE_DIR=/opt/models
      - LOG_LEVEL=INFO
      - MAX_BATCH_SIZE=32
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s  # 10 minutes for first export
    restart: unless-stopped

volumes:
  model-cache:
